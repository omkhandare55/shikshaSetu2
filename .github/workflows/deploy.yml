name: 🚀 Deploy ShikshaSetu

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  # ── Job 1: Deploy FastAPI Backend to Google Cloud Run ─────────────────────
  deploy-backend:
    name: 🐍 Backend → Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ⚙️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: 🐳 Build & Push Docker image via Cloud Build
        run: |
          gcloud builds submit \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/shikshasetu-api:${{ github.sha }} \
            --timeout=20m

      - name: 🚀 Deploy to Cloud Run
        run: |
          gcloud run deploy shikshasetu-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/shikshasetu-api:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 300 \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest" \
            --set-env-vars "PORT=8080"

      - name: 📋 Print Backend URL
        run: |
          URL=$(gcloud run services describe shikshasetu-api \
            --region us-central1 \
            --format 'value(status.url)')
          echo "✅ Backend deployed at: $URL"

  # ── Job 2: Deploy Next.js Frontend to Firebase Hosting ───────────────────
  deploy-frontend:
    name: ⚛️ Frontend → Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-backend    # Wait for backend to finish first

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build Next.js app
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY:            ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:        ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID:         ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:     ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID:             ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:     ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          NEXT_PUBLIC_API_URL:                     ${{ secrets.NEXT_PUBLIC_API_URL }}
          API_ORIGIN:                              ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

      - name: 🔥 Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: shikshasetu-b9164
          channelId: live
